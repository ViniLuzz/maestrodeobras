<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maestro de Obras — Em breve</title>
  <meta name="description" content="Maestro de Obras — em breve. Estamos finalizando os últimos detalhes." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#1A2B5E" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      background: linear-gradient(160deg, #1A2B5E 0%, #0F1837 100%);
      color: #fff;
    }
    .wrap { max-width: 540px; }
    .logo { height: 130px; width: auto; max-width: 100%; margin: 0 auto 36px; display: block; }
    h1 { font-size: 36px; font-weight: 800; margin-bottom: 16px; }
    .accent { color: #F07000; }
    p { font-size: 17px; line-height: 1.6; color: rgba(255, 255, 255, 0.8); }
    .badge {
      display: inline-block;
      margin-top: 30px;
      padding: 9px 20px;
      border: 1px solid rgba(240, 112, 0, 0.4);
      background: rgba(240, 112, 0, 0.12);
      color: #F07000;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
    }
    @media (max-width: 600px) {
      .logo { height: 100px; }
      h1 { font-size: 28px; }
      p { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="logo2.png" alt="Maestro de Obras" class="logo" />
    <h1>Em <span class="accent">breve</span></h1>
    <p>Estamos finalizando os últimos detalhes para transformar a gestão da sua obra.</p>
    <div class="badge">🚧 Site em manutenção</div>
  </div>
</body>
</html>
